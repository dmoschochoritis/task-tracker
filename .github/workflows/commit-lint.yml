name: Commit Message Lint

on: [pull_request]

jobs:
  check-commit-message:
  runs-on: ubuntu-latest
  steps:
  -uses: actions/checkout@v4
  -name: Validate commit message format
  run: |
    MSG=$(gi log-1 --pretty=%s)
    echo "Checking commit: $MSG"
    echo "$MSG" | grep -E"^(feat|fix|docs|chore|refactor|test)(\(.+\))?:"||(echo "XX Commit mesage does not follow Conventional Commits format"&& exit 1)
